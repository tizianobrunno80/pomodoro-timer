<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#121212"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB24D"/>
      <stop offset="52%" stop-color="#FF6200"/>
      <stop offset="100%" stop-color="#E04E00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- timer ring -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="#2c2c2c" stroke-width="48"/>
  <circle cx="512" cy="512" r="330" fill="none" stroke="#FF6200" stroke-width="48"
          stroke-linecap="round" stroke-dasharray="1555 2074"
          transform="rotate(-90 512 512)"/>
  <!-- start dot -->
  <circle cx="512" cy="182" r="26" fill="#FF6200"/>

  <!-- lightning bolt (Thunder mark) -->
  <path filter="url(#glow)" fill="url(#bolt)"
        d="M600 168 L348 566 L488 566 L426 856 L688 458 L548 458 Z"/>
</svg>
